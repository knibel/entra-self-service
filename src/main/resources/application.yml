spring:
  security:
    oauth2:
      client:
        registration:
          azure:
            provider: azure
            client-id: ${AZURE_CLIENT_ID}
            client-secret: ${AZURE_CLIENT_SECRET}
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - openid
              - profile
              - email
              - User.ReadWrite.All
              - Directory.Read.All
              - Mail.Send
        provider:
          azure:
            issuer-uri: https://login.microsoftonline.com/${ENTRA_TENANT_ID}/v2.0
            user-name-attribute: sub

entra:
  tenant-id: ${ENTRA_TENANT_ID}
  tenant-domain: ${ENTRA_TENANT_DOMAIN}
  client-registration-id: azure
  password-reset-url: ${ENTRA_PASSWORD_RESET_URL:https://passwordreset.microsoftonline.com/}
